{% extends "base.html" %}
{% block title %}Customer Display — POS Cafe{% endblock %}
{% block extra_head %}
<style>
  body { background:#050505; }
  .status-paid { background:rgba(34,197,94,0.08); border-color:rgba(34,197,94,0.3); }
  .status-unpaid { background:rgba(249,115,22,0.05); border-color:rgba(249,115,22,0.2); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .float { animation:float 3s ease-in-out infinite; }
  @keyframes pulse-ring { 0%{transform:scale(.9);opacity:1} 100%{transform:scale(1.3);opacity:0} }
  .pulse-ring { animation:pulse-ring 1.5s ease-out infinite; }
</style>
{% endblock %}
{% block body %}
<div class="min-h-screen flex flex-col items-center justify-center p-8">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 brand-gradient rounded-2xl mb-4 float">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      </div>
      <div class="font-display text-2xl font-800 text-white">POS Cafe</div>
      <div class="text-gray-600 text-sm">Customer Display</div>
    </div>

    <!-- Order Card -->
    <div id="order-card" class="card p-6 border status-unpaid" style="border-radius:20px;display:none">
      <div class="flex items-center justify-between mb-5">
        <div>
          <div class="text-xs text-gray-500 uppercase tracking-wider">Order</div>
          <div class="font-display font-800 text-xl" id="c-order-num">—</div>
        </div>
        <div id="c-status-badge" class="tag bg-orange-900/30 text-orange-400">Unpaid</div>
      </div>
      <div id="c-items" class="space-y-2 mb-5"></div>
      <div class="border-t border-border pt-4">
        <div class="flex justify-between items-center">
          <span class="text-gray-400 text-sm">Total</span>
          <span class="font-display font-800 text-2xl text-brand-500" id="c-total">₹0</span>
        </div>
      </div>
      <div id="c-payment-method" class="mt-3 text-xs text-gray-600 text-center"></div>
    </div>

    <!-- Idle state -->
    <div id="idle-state" class="text-center">
      <div class="relative inline-flex">
        <div class="w-20 h-20 rounded-full" style="background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2)"></div>
        <div class="pulse-ring absolute inset-0 rounded-full" style="border:1px solid rgba(249,115,22,0.3)"></div>
      </div>
      <div class="text-gray-600 mt-6 text-sm">Waiting for your order...</div>
      <div class="text-gray-700 text-xs mt-2">Ask staff to start your order</div>
    </div>

    <div class="mt-8 text-center">
      <span id="c-clock" class="text-gray-700 text-xs font-mono"></span>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const socket = io();
socket.on('order_update', d => { showOrder(d); });
socket.on('order_paid', d => { markPaid(d); });

function showOrder(d) {
  document.getElementById('idle-state').style.display='none';
  document.getElementById('order-card').style.display='block';
  document.getElementById('c-order-num').textContent = d.order_number;
}

function markPaid(d) {
  document.getElementById('c-status-badge').className='tag bg-green-900/30 text-green-400';
  document.getElementById('c-status-badge').textContent='Paid';
  document.getElementById('order-card').classList.remove('status-unpaid');
  document.getElementById('order-card').classList.add('status-paid');
  document.getElementById('c-total').textContent = '₹'+d.total.toFixed(0);
  document.getElementById('c-payment-method').textContent = 'Paid via '+(d.method==='cash'?'Cash':d.method==='upi'?'UPI':'Card');
}

setInterval(()=>{ document.getElementById('c-clock').textContent = new Date().toLocaleTimeString(); },1000);
</script>
{% endblock %}
