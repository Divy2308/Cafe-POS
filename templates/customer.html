{% extends "base.html" %}
{% block title %}Customer Display — POS Cafe{% endblock %}
{% block extra_head %}
<style>
  body { background:#050505; padding: 20px; }
  .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
  @media (max-width: 1024px) {
    .orders-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
  }
  @media (max-width: 640px) {
    .orders-grid { grid-template-columns: 1fr; }
  }
  .order-card { border: 2px solid #333; border-radius: 16px; padding: 20px; transition: all 0.3s; position: relative; }
  .order-card.sent { background: rgba(249,115,22,0.08); border-color: rgba(249,115,22,0.3); }
  .order-card.preparing { background: rgba(249,115,22,0.12); border-color: rgba(249,115,22,0.5); animation: pulse-prep 2s infinite; }
  .order-card.ready { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.5); }
  @keyframes pulse-prep { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
  .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
  .order-number { font-size: 32px; font-weight: 800; color: #f97316; font-family: monospace; }
  .order-status-badge { display: inline-block; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; }
  .status-sent { background: rgba(249,115,22,0.2); color: #f97316; }
  .status-preparing { background: rgba(249,115,22,0.25); color: #ffa500; }
  .status-ready { background: rgba(34,197,94,0.2); color: #22c55e; }
  .order-time { font-size: 12px; color: #999; margin-top: 4px; font-family: monospace; }
  .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #f97316 0%, #22c55e 100%); border-radius: 4px; transition: width 0.5s; }
  .progress-fill.sent { width: 33%; }
  .progress-fill.preparing { width: 67%; }
  .progress-fill.ready { width: 100%; }
  .order-items { margin: 12px 0; }
  .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
  .order-item:last-child { border-bottom: none; }
  .item-name { flex: 1; color: #ccc; }
  .item-qty { color: #999; padding: 0 8px; }
  .item-price { color: #f97316; font-weight: 600; }
  .order-total { display: flex; justify-content: space-between; padding: 12px 0; border-top: 2px solid rgba(255,255,255,0.1); margin-top: 12px; font-size: 18px; font-weight: 700; }
  .total-label { color: #999; }
  .total-amount { color: #22c55e; font-size: 24px; }
  .idle-message { text-align: center; padding: 60px 20px; }
  .idle-icon { width: 80px; height: 80px; margin: 0 auto 20px; opacity: 0.3; }
  .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); }
  .header h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .header-subtitle { color: #999; font-size: 14px; }
  .live-indicator { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; margin-right: 6px; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }
  .order-eta { font-size: 11px; color: #f97316; font-weight: 600; margin-top: 4px; }
  .review-section { background: rgba(249,115,22,0.05); border: 2px dashed rgba(249,115,22,0.3); border-radius: 12px; padding: 16px; margin-top: 16px; }
  .review-title { font-size: 14px; font-weight: 600; color: #f97316; margin-bottom: 12px; }
  .review-panel { background: rgba(249,115,22,0.06); border: 1px solid rgba(249,115,22,0.18); border-radius: 16px; padding: 18px; margin-bottom: 20px; }
  .review-panel-header { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom: 14px; }
  .review-panel-note { font-size: 12px; color: #9ca3af; }
  .star-rating { display: flex; gap: 8px; margin-bottom: 12px; }
  .star-btn { width: 32px; height: 32px; border: 2px solid #444; background: transparent; border-radius: 6px; color: #999; font-size: 18px; cursor: pointer; transition: all 0.2s; }
  .star-btn:hover { border-color: #f97316; color: #f97316; }
  .star-btn.selected { border-color: #f97316; background: rgba(249,115,22,0.2); color: #f97316; }
  .review-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 8px; color: #ccc; padding: 8px 12px; font-size: 12px; resize: vertical; min-height: 60px; margin-bottom: 8px; }
  .review-input::placeholder { color: #666; }
  .review-submit { width: 100%; background: #f97316; color: white; border: none; border-radius: 8px; padding: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .review-submit:hover { background: #ea580c; }
  .review-display { background: rgba(249,115,22,0.08); border-left: 3px solid #f97316; border-radius: 8px; padding: 12px; margin-top: 12px; }
  .review-stars { color: #f97316; font-size: 14px; margin-bottom: 4px; }
  .review-comment { color: #ccc; font-size: 12px; font-style: italic; }
  .paid-badge { display: inline-block; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; background: rgba(34,197,94,0.2); color: #22c55e; }

</style>
{% endblock %}
{% block body %}
<div style="max-width: 1400px; margin: 0 auto;">
  <!-- Header -->
  <div class="header">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <h1 style="margin:0;">🍽️ POS Cafe</h1>
      <button onclick="logout()" style="background:#f97316; color:white; border:none; border-radius:8px; padding:10px 16px; font-weight:700; cursor:pointer;">
        Logout
      </button>
    </div>
    <div class="header-subtitle">
      <span class="live-indicator"></span>
      <span>Real-Time Order Status</span>
      <span id="clock" style="float: right; font-family: monospace; color: #666;"></span>
    </div>
  </div>

  <!-- Orders Grid -->
  <div id="review-panel" class="review-panel" style="display:none;"></div>
  <div id="orders-container" class="orders-grid"></div>

  <!-- Idle State -->
  <div id="idle-state" class="idle-message">
    <svg class="idle-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
    </svg>
    <div style="color: #999; font-size: 18px;">No active orders</div>
    <div style="color: #666; font-size: 14px; margin-top: 10px;">Waiting for orders to arrive...</div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const socket = io();
let orders = {};
let orderTimestamps = {};
let latestReviewRating = 5;
let latestReviewOrderId = null;
const reviewedOrderIds = new Set();

socket.on('new_ticket', t => { 
  if (!orders[t.order_number]) {
    orders[t.order_number] = {
      id: t.order_id,
      order_number: t.order_number,
      table: t.table,
      status: t.status || 'sent',
      items: t.items || [],
      total: t.total || 0,
      sent_at: t.sent_at || new Date().toISOString()
    };
    orderTimestamps[t.order_number] = new Date(t.sent_at);
  }
  render();
});

socket.on('ticket_update', d => { 
  for (let order_num in orders) {
    if (orders[order_num].table) {
      orders[order_num].status = d.status;
      if (d.started_at && !orders[order_num].started_at) {
        orders[order_num].started_at = d.started_at;
      }
    }
  }
  render();
});

socket.on('order_update', d => { 
  if (orders[d.order_number]) {
    orders[d.order_number].status = d.status;
    if (d.started_at) orders[d.order_number].started_at = d.started_at;
    if (d.completed_at) orders[d.order_number].completed_at = d.completed_at;
  }
  render();
});

socket.on('order_paid', d => { 
  if (orders[d.order_number]) {
    orders[d.order_number].status = 'paid';
  }
  render();
});

async function loadOrders() {
  try {
    const response = await fetch('/api/kitchen/tickets');
    const tickets = await response.json();
    
    orders = {};
    tickets.forEach(t => {
      if (t.status !== 'completed') {
        orders[t.order_number] = {
          id: t.order_id,
          order_number: t.order_number,
          table: t.table,
          status: t.status,
          items: t.items || [],
          total: t.total || 0,
          sent_at: t.sent_at,
          started_at: t.started_at,
          time_in_prep: t.time_in_prep || 0
        };
        orderTimestamps[t.order_number] = new Date(t.sent_at);
      }
    });
    render();
  } catch (e) {
    console.error('Failed to load orders:', e);
  }
}

function getOrderAge(order) {
  const sentTime = new Date(order.sent_at);
  const now = new Date();
  const minutes = Math.floor((now - sentTime) / 60000);
  return minutes;
}

function getPrepTime(order) {
  if (order.started_at) {
    const startTime = new Date(order.started_at);
    const now = new Date();
    return Math.floor((now - startTime) / 60000);
  }
  return 0;
}

function renderOrder(order) {
  const age = getOrderAge(order);
  const prepTime = getPrepTime(order);
  
  const isPaid = order.status === 'paid';
  const statusClass = `status-${order.status}`;
  const statusText = order.status === 'to_cook' ? 'Awaiting' : 
                     order.status === 'preparing' ? 'Preparing' : 
                     order.status === 'ready' ? 'Ready!' : 'Thank You!';
  const progressClass = order.status === 'to_cook' ? 'sent' : 
                        order.status === 'preparing' ? 'preparing' : 'ready';
  
  const itemsHtml = (order.items || []).map(item => `
    <div class="order-item">
      <span class="item-name">${item.name}</span>
      <span class="item-qty">×${item.qty}</span>
      <span class="item-price">₹${(item.price * item.qty).toFixed(0)}</span>
    </div>
  `).join('');
  
  const eta = order.status === 'preparing' ? `~${Math.max(5, 15 - prepTime)}m` : 
              order.status === 'to_cook' ? '~15m' : 'Ready now!';
  
  return `
    <div class="order-card ${order.status}">
      <div class="order-header">
        <div>
          <div class="order-number">#${order.order_number.split('-')[1]}</div>
          <div class="order-time">🪑 Table ${order.table}</div>
          <div class="order-time">${age}m ago</div>
          ${order.status === 'preparing' ? `<div class="order-time">⏱️ Prep: ${prepTime}m</div>` : ''}
        </div>
        <div style="text-align: right;">
          <div class="order-status-badge ${statusClass}">${statusText}</div>
          ${isPaid ? '<div class="paid-badge">✓ Paid</div>' : ''}
          ${!isPaid ? `<div class="order-eta">${eta}</div>` : ''}
        </div>
      </div>
      
      <div class="progress-bar">
        <div class="progress-fill ${progressClass}"></div>
      </div>
      
      <div class="order-items">
        ${itemsHtml}
      </div>
      
      <div class="order-total">
        <span class="total-label">Total</span>
        <span class="total-amount">₹${order.total.toFixed(0)}</span>
      </div>
    </div>
  `;
}

function render() {
  const activeOrders = Object.values(orders).sort((a, b) => new Date(b.sent_at) - new Date(a.sent_at));
  
  if (activeOrders.length === 0) {
    document.getElementById('orders-container').style.display = 'none';
    document.getElementById('idle-state').style.display = 'block';
  } else {
    document.getElementById('orders-container').style.display = 'grid';
    document.getElementById('idle-state').style.display = 'none';
    document.getElementById('orders-container').innerHTML = activeOrders.map(o => renderOrder(o)).join('');
  }
  renderReviewPanel(activeOrders);
}

function renderReviewPanel(activeOrders) {
  const panel = document.getElementById('review-panel');
  const paidOrders = activeOrders.filter(o => o.status === 'paid').sort((a, b) => new Date(b.sent_at || 0) - new Date(a.sent_at || 0));
  if (!paidOrders.length) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    latestReviewOrderId = null;
    return;
  }

  const latest = paidOrders[0];
  if (latestReviewOrderId !== latest.id) {
    latestReviewOrderId = latest.id;
    if (!reviewedOrderIds.has(latest.id)) {
      latestReviewRating = 5;
    }
  }
  panel.style.display = 'block';
  if (reviewedOrderIds.has(latest.id)) {
    panel.innerHTML = `
      <div class="review-panel-header">
        <div>
          <div class="review-title">✓ Review Sent</div>
          <div class="review-panel-note">Thanks for your feedback on order #${latest.order_number.split('-')[1]}. It is already visible in the dashboard.</div>
        </div>
        <div class="paid-badge">Submitted</div>
      </div>
    `;
    return;
  }
  panel.innerHTML = `
    <div class="review-panel-header">
      <div>
        <div class="review-title">📝 Share Your Feedback</div>
        <div class="review-panel-note">Your review will appear in the staff dashboard for order #${latest.order_number.split('-')[1]}.</div>
      </div>
      <div class="paid-badge">Paid Order</div>
    </div>
    <div class="review-panel-note" style="margin-bottom:10px;">Table ${latest.table}</div>
    <div class="star-rating" id="latest-star-rating">
      <button class="star-btn" onclick="setLatestRating(1)" data-rating="1">⭐</button>
      <button class="star-btn" onclick="setLatestRating(2)" data-rating="2">⭐</button>
      <button class="star-btn" onclick="setLatestRating(3)" data-rating="3">⭐</button>
      <button class="star-btn" onclick="setLatestRating(4)" data-rating="4">⭐</button>
      <button class="star-btn selected" onclick="setLatestRating(5)" data-rating="5">⭐</button>
    </div>
    <textarea class="review-input" id="latest-review-comment" placeholder="Share your experience... (optional)" maxlength="500"></textarea>
    <button class="review-submit" onclick="submitLatestReview(${latest.id})">Submit Review</button>
  `;
  latestReviewRating = 5;
}

function setLatestRating(rating) {
  latestReviewRating = rating;
  const container = document.getElementById('latest-star-rating');
  if (!container) return;
  container.querySelectorAll('.star-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx < rating);
  });
}

async function submitLatestReview(orderId) {
  const commentEl = document.getElementById('latest-review-comment');
  const comment = commentEl ? commentEl.value.trim() : '';
  try {
    const response = await fetch(`/api/orders/${orderId}/review`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rating: latestReviewRating, comment })
    });
    if (response.ok) {
      reviewedOrderIds.add(orderId);
      const panel = document.getElementById('review-panel');
      panel.innerHTML = `
        <div class="review-title">✓ Thank You for Your Review!</div>
        <div class="review-display">
          <div class="review-stars">${'⭐'.repeat(latestReviewRating)} (${latestReviewRating}/5 stars)</div>
          ${comment ? `<div class="review-comment">"${comment.substring(0, 100)}${comment.length > 100 ? '...' : ''}"</div>` : ''}
        </div>
      `;
      setTimeout(loadOrders, 1000);
    } else {
      alert('Error submitting review. Please try again.');
    }
  } catch (err) {
    console.error('Review submission error:', err);
    alert('Error submitting review');
  }
}

function setRating(orderNumber, rating) {
  const container = document.getElementById(`star-rating-${orderNumber}`);
  container.querySelectorAll('.star-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx < rating);
  });
  container.dataset.rating = rating;
}

async function submitReview(orderNumber, orderId) {
  const container = document.getElementById(`star-rating-${orderNumber}`);
  const rating = parseInt(container.dataset.rating) || 5;
  const comment = document.getElementById(`comment-${orderNumber}`).value;
  
  try {
    const response = await fetch(`/api/orders/${orderId}/review`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rating, comment })
    });
    
    if (response.ok) {
      const reviewSection = document.querySelector(`[id^="star-rating-${orderNumber}"]`).closest('.review-section');
      if (reviewSection) {
        reviewSection.innerHTML = `
          <div class="review-title">✓ Thank You for Your Review!</div>
          <div class="review-display">
            <div class="review-stars">${'⭐'.repeat(rating)} (${rating}/5 stars)</div>
            ${comment ? `<div class="review-comment">"${comment.substring(0, 100)}${comment.length > 100 ? '...' : ''}"</div>` : ''}
          </div>
        `;
      }
    } else {
      alert('Error submitting review. Please try again.');
    }
  } catch (err) {
    console.error('Review submission error:', err);
    alert('Error submitting review');
  }
}

// Update times and load orders
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  render();
}, 1000);

loadOrders();
setInterval(loadOrders, 15000);

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/auth';
}
</script>
{% endblock %}
