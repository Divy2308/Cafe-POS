<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Authentication</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; padding: 2.5rem; width: 100%; max-width: 400px; }
  </style>
</head>
<body>
  <div class="glass-panel">
    <h1 class="text-2xl font-bold text-center mb-6">Restricted Access</h1>
    <form id="shreyForm" onsubmit="login(event)">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-400 mb-2">Identifier</label>
        <input type="text" id="username" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-400 mb-2">Passcode</label>
        <input type="password" id="password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500" required>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
        Authenticate
      </button>
      <div id="errorMsg" class="mt-4 text-red-500 text-sm text-center hidden">Invalid credentials</div>
    </form>
  </div>

  <script>
    async function login(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const res = await fetch('/shreyapi/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      if (res.ok) {
        window.location.href = '/shreyadmin';
      } else {
        document.getElementById('errorMsg').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
